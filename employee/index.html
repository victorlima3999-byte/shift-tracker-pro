<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shifts">
  <meta name="theme-color" content="#080d17">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <title>Shift Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080d17;
      --surface: #0e1624;
      --surface-2: #141e2e;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --cyan: #22d3ee;
      --cyan-dim: rgba(34,211,238,0.12);
      --cyan-glow: rgba(34,211,238,0.25);
      --green: #4ade80;
      --green-glow: rgba(74,222,128,0.2);
      --red: #f87171;
      --red-glow: rgba(248,113,113,0.15);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.1);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --r: 14px;
      --r-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100%; touch-action: manipulation; overflow-x: hidden; }
    body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(34,211,238,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(34,211,238,0.025) 1px,transparent 1px); background-size:32px 32px; pointer-events:none; z-index:0; }

    /* SCREENS */
    .screen { display:none; position:relative; z-index:1; }
    .screen.active { display:block; }

    /* LOGIN SCREEN */
    .login-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:32px; }
    .login-logo { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .login-logo-icon { width:72px; height:72px; border-radius:20px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .login-logo-icon svg { width:36px; height:36px; }
    .login-title { font-family:var(--mono); font-size:1.1rem; letter-spacing:2px; text-transform:uppercase; color:var(--cyan); }
    .login-sub { font-size:0.85rem; color:var(--text-muted); text-align:center; }
    .login-form { width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
    .input-field { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text); font-size:1rem; padding:14px 16px; width:100%; outline:none; font-family:var(--sans); -webkit-appearance:none; min-height:52px; }
    .input-field:focus { border-color:rgba(34,211,238,0.5); }
    .input-field::placeholder { color:var(--text-muted); }
    .btn-primary { width:100%; height:52px; background:var(--cyan); color:#0a1628; font-size:1rem; font-weight:600; font-family:var(--sans); border:none; border-radius:var(--r-sm); cursor:pointer; letter-spacing:0.3px; }
    .btn-primary:active { opacity:0.85; }
    .btn-primary:disabled { background:var(--surface-2); color:var(--text-muted); cursor:not-allowed; }
    .error-msg { font-size:0.85rem; color:var(--red); text-align:center; min-height:20px; }

    /* TOP BAR */
    .top-bar { position:fixed; top:0; left:0; right:0; height:calc(56px + var(--safe-top)); padding-top:var(--safe-top); background:rgba(8,13,23,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding-left:calc(16px + var(--safe-left)); padding-right:calc(16px + var(--safe-right)); z-index:200; }
    .top-bar-title { font-family:var(--mono); font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; color:var(--cyan); }
    .top-bar-user { font-size:0.8rem; color:var(--text-muted); }

    /* MAIN SCREEN */
    .scroll-area { position:relative; z-index:1; padding-top:calc(56px + var(--safe-top) + 16px); padding-bottom:calc(100px + var(--safe-bottom)); padding-left:calc(16px + var(--safe-left)); padding-right:calc(16px + var(--safe-right)); display:flex; flex-direction:column; gap:12px; }

    /* DISPLAY CARD */
    .display-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:28px 20px 24px; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .time-label, .earn-label { font-family:var(--mono); font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
    .earn-label { margin-top:16px; }
    .time-display { font-family:var(--mono); font-size:3.2rem; font-weight:600; color:var(--green); font-variant-numeric:tabular-nums; letter-spacing:2px; line-height:1.1; text-shadow:0 0 24px var(--green-glow); margin-top:4px; }
    .time-display.glow { text-shadow:0 0 40px rgba(74,222,128,0.5), 0 0 80px rgba(74,222,128,0.12); }
    .earn-display { font-family:var(--mono); font-size:2rem; font-weight:600; color:var(--green); font-variant-numeric:tabular-nums; text-shadow:0 0 16px var(--green-glow); }
    .live-row { display:none; align-items:center; gap:6px; font-size:0.75rem; color:var(--text-muted); font-family:var(--mono); margin-top:8px; }
    .live-row.active { display:flex; }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 1.5s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }

    /* STATUS BADGE */
    .status-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:99px; font-size:0.78rem; font-weight:500; margin-top:10px; }
    .status-pending { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(251,191,36,0.2); }
    .status-approved { background:rgba(74,222,128,0.1); color:var(--green); border:1px solid rgba(74,222,128,0.2); }
    .status-rejected { background:var(--red-glow); color:var(--red); border:1px solid rgba(248,113,113,0.2); }

    /* CARD */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
    .card-section { padding:16px; border-bottom:1px solid var(--border); }
    .card-section:last-child { border-bottom:none; }
    .field-label { font-family:var(--mono); font-size:0.68rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .label-dot { width:4px; height:4px; border-radius:50%; background:var(--cyan); }
    select.input-field { background:var(--bg); }

    /* HISTORY */
    .section-title { font-family:var(--mono); font-size:0.72rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
    .shift-item { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--green); border-radius:var(--r-sm); padding:13px; margin-bottom:8px; }
    .shift-item.pending { border-left-color:var(--amber); }
    .shift-item.rejected { border-left-color:var(--red); }
    .shift-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .shift-date { font-family:var(--mono); font-size:0.78rem; color:var(--text-muted); }
    .shift-client { font-size:0.82rem; color:var(--cyan); font-weight:500; }
    .shift-values { display:flex; justify-content:space-between; align-items:center; }
    .shift-time { font-family:var(--mono); font-size:0.85rem; color:var(--text-dim); }
    .shift-earn { font-family:var(--mono); font-size:0.95rem; color:var(--green); font-weight:600; }
    .shift-item.pending .shift-earn { color:var(--amber); }
    .shift-item.rejected .shift-earn { color:var(--red); }
    .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:0.9rem; }

    /* LOCATION BADGE */
    .location-row { display:flex; align-items:center; gap:6px; margin-top:6px; }
    .location-badge { font-size:0.72rem; color:var(--text-muted); font-family:var(--mono); display:flex; align-items:center; gap:4px; }
    .location-badge.outside { color:var(--red); }

    /* BOTTOM BAR */
    .bottom-bar { position:fixed; bottom:0; left:0; right:0; padding:12px 16px; padding-bottom:calc(12px + var(--safe-bottom)); padding-left:calc(16px + var(--safe-left)); padding-right:calc(16px + var(--safe-right)); background:rgba(8,13,23,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); z-index:100; }
    .btn-action { width:100%; height:54px; font-size:1rem; font-weight:600; font-family:var(--sans); border-radius:var(--r); border:1px solid var(--border); cursor:pointer; background:var(--surface-2); color:var(--text-muted); transition:opacity 0.15s; }
    .btn-action.ready { background:var(--cyan); color:#0a1628; border-color:transparent; box-shadow:0 4px 20px var(--cyan-glow); }
    .btn-action.ready:active { opacity:0.85; }
    .btn-action.end { background:transparent; border:1.5px solid var(--red); color:var(--red); box-shadow:0 0 16px var(--red-glow); }
    .btn-action.end:active { opacity:0.8; }

    /* LOADER */
    .loader-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; }
    .loader-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loader-text { font-family:var(--mono); font-size:0.75rem; letter-spacing:1px; color:var(--text-muted); }

    /* TOAST */
    .toast { position:fixed; bottom:calc(90px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 20px; font-size:0.85rem; color:var(--text); white-space:nowrap; opacity:0; transition:all 0.3s; z-index:500; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { border-color:rgba(74,222,128,0.3); color:var(--green); }
    .toast.error { border-color:rgba(248,113,113,0.3); color:var(--red); }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<!-- LOGIN SCREEN -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 36 36" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round">
          <circle cx="18" cy="18" r="13"/>
          <path d="M18 10v8l5 3"/>
        </svg>
      </div>
      <div class="login-title">Shift Tracker</div>
      <div class="login-sub">Employee Portal</div>
    </div>
    <div class="login-form">
      <input class="input-field" type="text" id="login-name" placeholder="Your full name" autocomplete="name">
      <input class="input-field" type="text" id="login-code" placeholder="Access code" autocomplete="off" style="font-family:var(--mono); letter-spacing:2px;">
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="screen-main">
  <div class="top-bar">
    <span class="top-bar-title">My Shifts</span>
    <span class="top-bar-user" id="top-user"></span>
  </div>

  <div class="scroll-area">

    <!-- Live display -->
    <div class="display-card">
      <div class="time-label">Time Worked</div>
      <div class="time-display" id="time-display">00:00:00</div>
      <div class="earn-label">Earnings</div>
      <div class="earn-display" id="earn-display">$0.00</div>
      <div class="live-row" id="live-row">
        <div class="live-dot"></div>
        <span id="live-text">Shift running</span>
      </div>
    </div>

    <!-- Inputs -->
    <div class="card" id="inputs-card">
      <div class="card-section">
        <div class="field-label"><span class="label-dot"></span>Job Site</div>
        <select class="input-field" id="client-select" style="background:var(--bg);">
          <option value="">Select a client...</option>
        </select>
      </div>
      <div class="card-section">
        <div class="field-label"><span class="label-dot"></span>Notes</div>
        <textarea class="input-field" id="shift-notes" placeholder="Any notes about this shift..." style="resize:none; height:80px; font-size:0.9rem;"></textarea>
      </div>
    </div>

    <!-- History -->
    <div class="section-title">Recent Shifts</div>
    <div id="history-container"></div>

  </div>

  <div class="bottom-bar">
    <button class="btn-action" id="btn-main" onclick="toggleShift()">Select a Job Site</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, addDoc, collection, query, where, orderBy, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB_yG1nZET8ETK308xfG7fLq-qB7kyXeBM",
    authDomain: "shift-tracker-pro-37a21.firebaseapp.com",
    projectId: "shift-tracker-pro-37a21",
    storageBucket: "shift-tracker-pro-37a21.firebasestorage.app",
    messagingSenderId: "52944513294",
    appId: "1:52944513294:web:646ab6980c486106e6cf5f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentEmployee = null;
  let activeShiftId = null;
  let tickInterval = null;
  let shiftStartTime = null;
  let userLocation = null;

  // ---- LOADER ----
  function hideLoader() { document.getElementById('loader').style.display = 'none'; }

  // ---- TOAST ----
  window.showToast = function(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ---- LOGIN ----
  window.doLogin = async function() {
    const name = document.getElementById('login-name').value.trim();
    const code = document.getElementById('login-code').value.trim().toUpperCase();
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';

    if (!name || !code) { errEl.textContent = 'Please fill in all fields.'; return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const snap = await getDoc(doc(db, 'employees', code));
      if (!snap.exists()) { errEl.textContent = 'Access code not found.'; btn.disabled=false; btn.textContent='Sign In'; return; }
      const data = snap.data();
      if (data.name.toLowerCase() !== name.toLowerCase()) { errEl.textContent = 'Name does not match.'; btn.disabled=false; btn.textContent='Sign In'; return; }

      currentEmployee = { id: code, ...data };
      localStorage.setItem('employeeSession', JSON.stringify(currentEmployee));
      enterMain();
    } catch(e) {
      errEl.textContent = 'Connection error. Try again.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // ---- SESSION ----
  function checkSession() {
    const saved = localStorage.getItem('employeeSession');
    if (saved) {
      currentEmployee = JSON.parse(saved);
      enterMain();
    } else {
      hideLoader();
    }
  }

  // ---- MAIN ----
  async function enterMain() {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-main').classList.add('active');
    document.getElementById('top-user').textContent = currentEmployee.name;
    hideLoader();
    await loadClients();
    listenHistory();
    checkActiveShift();
    requestLocation();
    validateBtn();
  }

  // ---- LOCATION ----
  function requestLocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    }, () => {});
  }

  // ---- CLIENTS ----
  async function loadClients() {
    const snap = await getDoc(doc(db, 'meta', 'clients'));
    const sel = document.getElementById('client-select');
    sel.innerHTML = '<option value="">Select a client...</option>';
    if (snap.exists()) {
      const clients = snap.data().list || [];
      clients.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.name;
        sel.appendChild(o);
      });
    }
    sel.onchange = () => {};
  }

  // ---- VALIDATE BUTTON ----
  function validateBtn() {
    if (activeShiftId) return;
    const btn = document.getElementById('btn-main');
    btn.classList.add('ready');
    btn.textContent = 'Clock In';
  }

  // ---- ACTIVE SHIFT ----
  async function checkActiveShift() {
    const q = query(collection(db,'shifts'), where('employeeId','==',currentEmployee.id), where('status','==','active'));
    const snap = await (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")).getDocs(q);
    if (!snap.empty) {
      const d = snap.docs[0];
      activeShiftId = d.id;
      shiftStartTime = d.data().clockIn.toDate();
      startTick();
      setActiveUI();
    }
  }

  // ---- TICK ----
  function startTick() {
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(updateDisplay, 1000);
    updateDisplay();
  }

  function updateDisplay() {
    if (!shiftStartTime) return;
    const now = new Date();
    const sec = Math.max(0, Math.floor((now - shiftStartTime) / 1000));
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    document.getElementById('time-display').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const rate = currentEmployee.hourlyRate || 0;
    document.getElementById('earn-display').textContent = `$${(sec * rate / 3600).toFixed(2)}`;
  }

  function setActiveUI() {
    const btn = document.getElementById('btn-main');
    btn.className = 'btn-action end';
    btn.textContent = 'Clock Out';
    document.getElementById('time-display').classList.add('glow');
    document.getElementById('live-row').classList.add('active');
    document.getElementById('inputs-card').style.opacity = '0.5';
    document.getElementById('inputs-card').style.pointerEvents = 'none';
  }

  function resetUI() {
    const btn = document.getElementById('btn-main');
    btn.className = 'btn-action ready';
    btn.textContent = 'Clock In';
    document.getElementById('time-display').classList.remove('glow');
    document.getElementById('live-row').classList.remove('active');
    document.getElementById('time-display').textContent = '00:00:00';
    document.getElementById('earn-display').textContent = '$0.00';
    document.getElementById('inputs-card').style.opacity = '1';
    document.getElementById('inputs-card').style.pointerEvents = 'all';
    document.getElementById('client-select').value = '';
    document.getElementById('shift-notes').value = '';
    clearInterval(tickInterval);
    tickInterval = null;
    shiftStartTime = null;
    activeShiftId = null;
  }

  // ---- TOGGLE SHIFT ----
  window.toggleShift = async function() {
    const btn = document.getElementById('btn-main');
    if (!activeShiftId) {
      if (!btn.classList.contains('ready')) return;
      const clientId = document.getElementById('client-select').value || 'none';
      const clientName = clientId === 'none' ? 'No site selected' : document.getElementById('client-select').selectedOptions[0].textContent;
      const notes = document.getElementById('shift-notes').value.trim();
      btn.disabled = true;
      btn.textContent = 'Clocking in...';
      try {
        requestLocation();
        const ref = await addDoc(collection(db,'shifts'), {
          employeeId: currentEmployee.id,
          employeeName: currentEmployee.name,
          clientId,
          clientName,
          notes,
          clockIn: serverTimestamp(),
          clockOut: null,
          status: 'active',
          hourlyRate: currentEmployee.hourlyRate || 0,
          clockInLocation: userLocation || null,
          clockOutLocation: null
        });
        activeShiftId = ref.id;
        shiftStartTime = new Date();
        startTick();
        setActiveUI();
        showToast('Clocked in!', 'success');
      } catch(e) {
        showToast('Error clocking in.', 'error');
        btn.disabled = false;
        validateBtn();
      }
    } else {
      btn.disabled = true;
      btn.textContent = 'Clocking out...';
      try {
        requestLocation();
        const now = new Date();
        const sec = Math.max(0, Math.floor((now - shiftStartTime) / 1000));
        const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
        const duration = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        const earned = (sec * (currentEmployee.hourlyRate||0) / 3600).toFixed(2);
        await updateDoc(doc(db,'shifts',activeShiftId), {
          clockOut: serverTimestamp(),
          status: 'pending',
          duration,
          earned: parseFloat(earned),
          clockOutLocation: userLocation || null
        });
        showToast('Clocked out! Awaiting approval.', 'success');
        resetUI();
      } catch(e) {
        showToast('Error clocking out.', 'error');
        btn.disabled = false;
        btn.className = 'btn-action end';
        btn.textContent = 'Clock Out';
      }
    }
  }

  // ---- HISTORY ----
  function listenHistory() {
    const q = query(collection(db,'shifts'), where('employeeId','==',currentEmployee.id), orderBy('clockIn','desc'));
    onSnapshot(q, snap => {
      const container = document.getElementById('history-container');
      const shifts = snap.docs.filter(d => d.data().status !== 'active');
      if (shifts.length === 0) {
        container.innerHTML = '<div class="empty-state">No completed shifts yet.</div>';
        return;
      }
      container.innerHTML = shifts.map(d => {
        const s = d.data();
        const date = s.clockIn ? s.clockIn.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'N/A';
        const statusClass = s.status === 'approved' ? 'approved' : s.status === 'rejected' ? 'rejected' : 'pending';
        const statusLabel = s.status === 'approved' ? 'Approved' : s.status === 'rejected' ? 'Rejected' : 'Pending';
        const earn = s.status === 'approved' ? `$${parseFloat(s.earned||0).toFixed(2)}` : `~$${parseFloat(s.earned||0).toFixed(2)}`;
        const locBadge = s.clockInLocation ? `<div class="location-badge">&#x2022; GPS recorded</div>` : '';
        return `<div class="shift-item ${statusClass}">
          <div class="shift-header">
            <span class="shift-date">${date}</span>
            <span class="shift-client">${s.clientName||'N/A'}</span>
          </div>
          <div class="shift-values">
            <span class="shift-time">${s.duration||'--:--:--'}</span>
            <span class="shift-earn">${earn}</span>
          </div>
          <div class="location-row">${locBadge}<span class="status-badge status-${statusClass}">${statusLabel}</span></div>
        </div>`;
      }).join('');
    });
  }

  // ---- INIT ----
  checkSession();

  // Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/employee/sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
